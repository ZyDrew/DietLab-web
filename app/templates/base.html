<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DietLab - {% block title %}{% endblock %}</title>
        <script src="https://unpkg.com/htmx.org@2.0.0" integrity="sha384-wS5l5IKJBvK6sPTKa2WZ1js3d947pvWXbPJ1OmWfEuxLgeHcEbjUUA5i9V5ZkpCw" crossorigin="anonymous"></script>
        <!--link rel="stylesheet" href="{{ request.url_for('static', path='/css/style.css') }}"-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <nav class="navbar navbar-dark bg-dark px-4">
            <a class="navbar-brand" href="/">DietLab</a>
            <div class="d-flex gap-3">
                <a class="nav-link text-white" href="/">Patients</a>
                <a class="nav-link text-white" href="/foods">Aliments</a>
                <a class="nav-link text-white" href="/recipes">Recettes</a>
            </div>
        </nav>

        <div class="container mt-4">
            <!-- Base template - body to fill -->
            {% block content %}
            {% endblock %}
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
