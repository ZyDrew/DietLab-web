<!-- template/patients/measurements_form.html -->

<div class="modal-header bg-success text-white">
    <h5 class="modal-title">Mesures</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<form   {% if measure %}hx-put="/patients/{{ patient_id }}/measurements/{{ measure.id }}/edit"
        {% else %}      hx-post="/patients/{{ patient_id }}/measurements/new"
        {% endif %}
        hx-target="#measurements-table" 
        hx-swap="innerHTML"
        hx-on::after-request="bootstrap.Modal.getInstance(document.getElementById('measurementsModal')).hide()">
        <div class="modal-body">
            <div class="row g-3">
                <label class="form-label">Entrer les informations.</label>
                <div class="col-md-6">
                    <label class="form-label">Taille en cm</label>
                    <input type="number" min="0" step="0.01" class="form-control" name="height" placeholder="170.00"
                            value="{{ measure.height if measure else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Poids en kg</label>
                    <input type="number" min="0" step="0.01" class="form-control" name="weight" placeholder="60.00"
                            value="{{ measure.weight if measure else '' }}">
                </div>
                <div class="col-12">
                    <label class="form-label">Date de prise</label>
                    <input type="date" class="form-control" name="record_date"
                            value="{{ measure.record_date if measure else today }}">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
            <button type="submit" class="btn btn-success">Enregistrer</button>
        </div>
</form>
